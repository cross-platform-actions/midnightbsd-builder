name: Build VM Disk Image

env:
  PACKER_VERSION: '1.15.1'

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  build:
    name: ${{ matrix.version }}, ${{ matrix.architecture.name }}
    runs-on: ubuntu-latest
    strategy:
        matrix:
          version:
            - '4.0.4'

          architecture:
            - name: x86-64
              qemu: x86
              qemu_executable: x86_64
              uname: amd64

    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Dependencies
        run: |
          sudo apt update && \
          sudo apt install -y \
          fdisk \
          dosfstools \
          rsync \
          curl \
          python3 \
          qemu-system-${{ matrix.architecture.qemu }}

      - name: Print QEMU version
        run: '"qemu-system-${{ matrix.architecture.qemu_executable || matrix.architecture.qemu }}" --version'

      - name: Install Packer
        run: |
          curl -o packer.zip -L https://releases.hashicorp.com/packer/${{ env.PACKER_VERSION }}/packer_${{ env.PACKER_VERSION }}_linux_amd64.zip
          unzip packer.zip
          mv packer /usr/local/bin

      - name: Build Image
        run: |
          PACKER_LOG=1 ./build.sh \
            '${{ matrix.version }}' \
            '${{ matrix.architecture.name }}' \
            -var 'headless=true'

      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3

      - name: Start Local HTTP Server
        run: python3 -m http.server 8080 --directory output &

      - name: Create File
        run: echo 'host to guest' > host_to_guest.txt

      - name: Test Image
        uses: cross-platform-actions/action@midnightbsd
        with:
          operating_system: midnightbsd
          architecture: ${{ matrix.architecture.name }}
          version: '${{ matrix.version }}'
          image_url: http://localhost:8080/midnightbsd-${{ matrix.version }}-${{ matrix.architecture.name }}.qcow2
          shutdown_vm: false
          shell: bash
          run: |
            set -x
            printf 'uname -a: '; uname -a
            printf 'uname -s: '; uname -s
            printf 'uname -r: '; uname -r
            printf 'uname -v: '; uname -v
            printf 'uname -m: '; uname -m
            printf 'uname -p: '; uname -p
            printf 'pwd: '; pwd
            printf 'echo $SHELL: '; echo $SHELL
            printf 'whoami: '; whoami
            printf 'hostname: '; hostname
            echo 'ls -lah:'; ls -lah
            echo 'env | sort:'; env | sort
            [ "`uname -s`" = 'MidnightBSD' ]
            [ "`uname -m`" = '${{ matrix.architecture.uname || matrix.architecture.name }}' ] || [ "`uname -p`" = '${{ matrix.architecture.uname || matrix.architecture.name }}' ]
            [ "`pwd`" = '/home/runner/work/midnightbsd-builder/midnightbsd-builder' ] || [ "`pwd`" = '/usr/home/runner/work/midnightbsd-builder/midnightbsd-builder' ]
            [ "`hostname`" = 'runnervmg1sw1.local' ]
            cat host_to_guest.txt | grep -q 'host to guest'
            echo 'guest to host' > guest_to_host.txt

      - name: Verify File Synchronization
        run: cat guest_to_host.txt | grep -q 'guest to host'

      - name: Create Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          github_ref_name: ${{ github.ref_name }}
        run: |
          version="${github_ref_name#v}"
          sed -n "/^## \[${version}\]/,/^## \[/{/^## \[${version}\]/d;/^## \[/d;p;}" changelog.md \
            | gh release create \
              "$github_ref_name" \
              --title "MidnightBSD ${version}" \
              --draft \
              --notes-file - \
              output/*
